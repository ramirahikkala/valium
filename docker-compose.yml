services:
  api:
    build: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://valium:valium@db:5432/valium}
      API_PORT: "8000"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    volumes:
      - plant_images:/app/plant_images

  web:
    build: ./web
    environment:
      API_URL: http://api:8000
    depends_on:
      - api

volumes:
  plant_images:
