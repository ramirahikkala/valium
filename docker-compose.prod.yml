# Production overrides — used on the server via:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  api:
    networks:
      - default
      - db-network
      - caddy-proxy

  web:
    networks:
      - default
      - caddy-proxy

networks:
  caddy-proxy:
    external: true
  db-network:
    external: true
    name: db-network
