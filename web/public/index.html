<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valium - Todo App</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Login screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1>Valium</h1>
      <p class="subtitle">Your little helper for getting things done</p>
      <div id="google-signin-btn" class="google-signin-wrapper"></div>
      <p id="login-error" class="login-error" hidden></p>
    </div>
  </div>

  <!-- App (hidden until authenticated) -->
  <div id="app-container" hidden>
    <header>
      <div class="header-content">
        <div class="header-left">
          <h1>Valium</h1>
          <p class="subtitle">Your little helper for getting things done</p>
        </div>
        <div class="header-right">
          <div class="user-info">
            <img id="user-avatar" class="user-avatar" src="" alt="" hidden>
            <span id="user-name" class="user-name"></span>
            <button id="sign-out-btn" class="btn btn-signout">Sign out</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="list-selector" aria-label="Select a list">
        <div class="list-tabs" id="list-tabs" role="tablist"></div>
        <div class="list-actions">
          <form id="add-list-form" class="add-list-form">
            <input
              type="text"
              id="new-list-name"
              placeholder="New list name..."
              required
              autocomplete="off"
            >
            <button type="submit" class="btn btn-primary btn-sm">Add List</button>
          </form>
        </div>
      </section>

      <section class="add-task" aria-label="Add a new task">
        <form id="add-task-form">
          <div class="form-group">
            <label for="task-title">Title</label>
            <input
              type="text"
              id="task-title"
              name="title"
              placeholder="What needs to be done?"
              required
              autocomplete="off"
            >
          </div>
          <div class="form-group">
            <label for="task-description">Description (optional)</label>
            <textarea
              id="task-description"
              name="description"
              placeholder="Add some details..."
              rows="2"
            ></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Add Task</button>
        </form>
      </section>

      <section class="task-controls" aria-label="Filter tasks">
        <div class="filter-buttons" role="group" aria-label="Filter by status">
          <button class="btn btn-filter active" data-filter="all">All</button>
          <button class="btn btn-filter" data-filter="pending">Pending</button>
          <button class="btn btn-filter" data-filter="in_progress">In Progress</button>
          <button class="btn btn-filter" data-filter="done">Done</button>
        </div>
      </section>

      <section class="task-list-section" aria-label="Task list">
        <div id="error-message" class="error-message" role="alert" hidden></div>
        <ul id="task-list" class="task-list" aria-live="polite"></ul>
        <p id="empty-state" class="empty-state" hidden>No tasks yet. Add one above!</p>
      </section>
    </main>
  </div>

  <!-- Edit modal -->
  <div id="edit-modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-labelledby="edit-modal-title" aria-modal="true">
      <h2 id="edit-modal-title">Edit Task</h2>
      <form id="edit-task-form">
        <input type="hidden" id="edit-task-id">
        <div class="form-group">
          <label for="edit-title">Title</label>
          <input type="text" id="edit-title" required>
        </div>
        <div class="form-group">
          <label for="edit-description">Description</label>
          <textarea id="edit-description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="edit-status">Status</label>
          <select id="edit-status">
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-group">
          <label for="edit-list">Move to list</label>
          <select id="edit-list"></select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="edit-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
