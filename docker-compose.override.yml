# Local development overrides — applied automatically by docker compose up
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: valium
      POSTGRES_PASSWORD: valium
      POSTGRES_DB: valium
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valium"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    ports:
      - "3000:3000"

volumes:
  pgdata:
